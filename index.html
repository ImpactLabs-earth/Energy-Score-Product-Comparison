<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoImpact Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="background-effects">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>EcoImpact Calculator</h1>
            <p>Compare the financial and climate impact of home appliances over time.</p>
        </header>

        <div class="main-content">
            <div class="card product-selection-card">
                <h2>1. Select a Product Category</h2>
                <div class="product-grid" id="product-grid">
                    <!-- Javascript will inject product boxes here -->
                </div>
            </div>

            <div class="card settings-card">
                <h2>2. Global Settings</h2>
                <div class="input-group">
                    <label for="country">Country of Living</label>
                    <select id="country">
                        <option value="0.031">France</option>
                        <option value="0.342">Germany</option>
                        <option value="0.117">Portugal</option>
                        <option value="0.136">Spain</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="elec-price">
                        Electricity Price (€/kWh)
                        <div class="info-icon">
                            ?
                            <div class="tooltip">Average consumer electricity price. You can adjust this based on your current energy contract.</div>
                        </div>
                    </label>
                    <input type="number" id="elec-price" value="0.25" step="0.01">
                </div>
                <div class="input-group">
                    <label for="co2-intensity">
                        Grid CO₂ Intensity (kg CO₂/kWh)
                        <div class="info-icon">
                            ?
                            <div class="tooltip">CO₂ emitted to produce 1 kWh of electricity in the selected country. Source: ElectricityMaps 2025.</div>
                        </div>
                    </label>
                    <input type="number" id="co2-intensity" value="0.031" step="0.001">
                </div>
                <div class="input-group">
                    <label for="mfg-co2">
                        Manufacturing Impact (kg CO₂)
                        <div class="info-icon">
                            ?
                            <div class="tooltip">Average CO₂ emitted during the production of this item. Assume same for both. Source: Base Empreinte ADEME.</div>
                        </div>
                    </label>
                    <input type="number" id="mfg-co2" value="257" step="1">
                </div>
            </div>

            <div class="fridges-container">
                <!-- Option A -->
                <div class="card fridge-card">
                    <div class="card-header">
                        <h2 id="title-a">Option A</h2>
                        <span class="badge badge-a">Standard</span>
                    </div>
                    <div class="input-group">
                        <label for="f1-price">Purchase Price (€)</label>
                        <input type="number" id="f1-price" value="300" step="10">
                    </div>
                    <div class="input-group">
                        <label for="f1-label">Energy Label</label>
                        <select id="f1-label">
                            <option value="A">A (Most Efficient)</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                            <option value="E">E</option>
                            <option value="F" selected>F</option>
                            <option value="G">G (Least Efficient)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="f1-kwh">Est. Yearly Consumption (kWh)</label>
                        <input type="number" id="f1-kwh" value="300">
                    </div>
                    <div class="input-group">
                        <label for="f1-lifetime">Estimated Lifetime (years)</label>
                        <input type="number" id="f1-lifetime" value="10">
                    </div>
                </div>

                <!-- Option B -->
                <div class="card fridge-card">
                    <div class="card-header">
                        <h2 id="title-b">Option B</h2>
                        <span class="badge badge-b">Alternative</span>
                    </div>
                    <div class="input-group">
                        <label for="f2-price">Purchase Price (€)</label>
                        <input type="number" id="f2-price" value="800" step="10">
                    </div>
                    <div class="input-group">
                        <label for="f2-label">Energy Label</label>
                        <select id="f2-label">
                            <option value="A" selected>A (Most Efficient)</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                            <option value="E">E</option>
                            <option value="F">F</option>
                            <option value="G">G (Least Efficient)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="f2-kwh">Est. Yearly Consumption (kWh)</label>
                        <input type="number" id="f2-kwh" value="100">
                    </div>
                    <div class="input-group">
                        <label for="f2-lifetime">Estimated Lifetime (years)</label>
                        <input type="number" id="f2-lifetime" value="15">
                    </div>
                </div>
            </div>

            <div class="actions">
                <button id="calculate-btn">Compare Impact</button>
            </div>

            <div id="results" class="results-container hidden">
                <div class="summary-box">
                    <h2 id="verdict-title">Analysis Verdict</h2>
                    <p id="verdict-text">...</p>
                </div>
                
                <div class="charts-container">
                    <div class="chart-wrapper card">
                        <h3>Cumulative Cost (€) over 20 Years</h3>
                        <canvas id="costChart"></canvas>
                    </div>
                    <div class="chart-wrapper card">
                        <h3>Cumulative CO₂ (kg) over 20 Years</h3>
                        <canvas id="co2Chart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
