<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoFridge: Compare & Invest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="background-effects">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>EcoFridge Impact Calculator</h1>
            <p>Compare the financial and climate impact of two refrigerators over time.</p>
        </header>

        <div class="main-content">
            <div class="card settings-card">
                <h2>Global Settings</h2>
                <div class="input-group">
                    <label for="elec-price">Electricity Price (€/kWh)</label>
                    <input type="number" id="elec-price" value="0.25" step="0.01">
                </div>
                <div class="input-group">
                    <label for="co2-intensity">Grid CO₂ Intensity (kg CO₂/kWh)</label>
                    <input type="number" id="co2-intensity" value="0.20" step="0.01">
                </div>
            </div>

            <div class="fridges-container">
                <!-- Fridge A -->
                <div class="card fridge-card">
                    <div class="card-header">
                        <h2>Fridge A</h2>
                        <span class="badge badge-a">Current</span>
                    </div>
                    <div class="input-group">
                        <label for="f1-price">Purchase Price (€)</label>
                        <input type="number" id="f1-price" value="300" step="10">
                    </div>
                    <div class="input-group">
                        <label for="f1-label">Energy Label</label>
                        <select id="f1-label">
                            <option value="A">A (Most Efficient)</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                            <option value="E">E</option>
                            <option value="F" selected>F</option>
                            <option value="G">G (Least Efficient)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="f1-kwh">Est. Yearly Consumption (kWh)</label>
                        <input type="number" id="f1-kwh" value="300">
                    </div>
                </div>

                <!-- Fridge B -->
                <div class="card fridge-card">
                    <div class="card-header">
                        <h2>Fridge B</h2>
                        <span class="badge badge-b">Alternative</span>
                    </div>
                    <div class="input-group">
                        <label for="f2-price">Purchase Price (€)</label>
                        <input type="number" id="f2-price" value="800" step="10">
                    </div>
                    <div class="input-group">
                        <label for="f2-label">Energy Label</label>
                        <select id="f2-label">
                            <option value="A" selected>A (Most Efficient)</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                            <option value="E">E</option>
                            <option value="F">F</option>
                            <option value="G">G (Least Efficient)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="f2-kwh">Est. Yearly Consumption (kWh)</label>
                        <input type="number" id="f2-kwh" value="100">
                    </div>
                </div>
            </div>

            <div class="actions">
                <button id="calculate-btn">Compare Impact</button>
            </div>

            <div id="results" class="results-container hidden">
                <div class="summary-box">
                    <h2 id="verdict-title">Analysis Verdict</h2>
                    <p id="verdict-text">...</p>
                </div>

                <div class="charts-container">
                    <div class="chart-wrapper card">
                        <h3>Cumulative Cost (€) over 10 Years</h3>
                        <canvas id="costChart"></canvas>
                    </div>
                    <div class="chart-wrapper card">
                        <h3>Cumulative CO₂ Emissions (kg) over 10 Years</h3>
                        <canvas id="co2Chart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
